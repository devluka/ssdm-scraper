name: Scrap — G2B (나라장터)

on:
  schedule:
    - cron: '0 20 * * *'    # KST 05:00
    - cron: '30 6 * * *'    # KST 15:30
  workflow_dispatch:

jobs:
  scrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install deps
        run: pip install -r requirements.txt
      
      - name: Run G2B scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SDM_COLLECTOR_PAT: ${{ secrets.SDM_COLLECTOR_PAT }}
        run: python -m scrapers.g2b
