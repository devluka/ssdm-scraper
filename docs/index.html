<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ẞDM Scrap Monitor</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>
                <span class="logo">ẞDM</span>
                <span class="title-sub">Scrap Monitor</span>
            </h1>
            <div class="header-meta">
                <span id="generated-at">--</span>
                <button id="refresh-btn" class="btn-refresh">↻ 새로고침</button>
            </div>
        </div>
    </header>
    
    <main>
        <!-- 소스별 현황 -->
        <section class="card">
            <h2>소스별 현황</h2>
            <div class="table-wrapper">
                <table id="sources-table">
                    <thead>
                        <tr>
                            <th>Source</th>
                            <th>24h 수집</th>
                            <th>Pending</th>
                            <th>Processed</th>
                            <th>Errors</th>
                            <th>Total</th>
                            <th>마지막 Scrap</th>
                            <th>마지막 Collect</th>
                        </tr>
                    </thead>
                    <tbody id="sources-tbody">
                        <tr><td colspan="8" class="loading">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        
        <!-- 7일 추이 차트 -->
        <section class="card">
            <h2>최근 7일 수집 추이</h2>
            <div class="chart-wrapper">
                <canvas id="trend-chart"></canvas>
            </div>
        </section>
        
        <!-- 최근 에러 -->
        <section class="card">
            <h2>최근 에러</h2>
            <div id="errors-list">
                <p class="empty">에러 없음</p>
            </div>
        </section>
    </main>
    
    <footer>
        <p>ẞDM v1.1.3 — 3-tier scrap pipeline</p>
    </footer>
    
    <script src="app.js"></script>
</body>
</html>
